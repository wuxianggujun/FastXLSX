name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-msvc-nmake:
    name: Windows VS2026 NMake
    runs-on: windows-2025-vs2026
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Locate Visual Studio
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath > vs-path.txt
          set /p VS_PATH=<vs-path.txt
          if "%VS_PATH%"=="" (
            echo Visual Studio with MSVC tools was not found.
            exit /b 1
          )
          if not exist "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" (
            echo vcvars64.bat was not found under the Visual Studio install.
            exit /b 1
          )
          echo VS_PATH=%VS_PATH%

      - name: Locate vcpkg
        shell: cmd
        run: |
          if "%VCPKG_ROOT%"=="" if not "%VCPKG_INSTALLATION_ROOT%"=="" set "VCPKG_ROOT=%VCPKG_INSTALLATION_ROOT%"
          if "%VCPKG_ROOT%"=="" if exist "C:\vcpkg\vcpkg.exe" set "VCPKG_ROOT=C:\vcpkg"
          if "%VCPKG_ROOT%"=="" (
            echo VCPKG_ROOT and VCPKG_INSTALLATION_ROOT were not set, and C:\vcpkg was not found.
            exit /b 1
          )
          if not exist "%VCPKG_ROOT%\vcpkg.exe" (
            echo vcpkg.exe was not found under %VCPKG_ROOT%.
            exit /b 1
          )
          if not exist "%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" (
            echo vcpkg CMake toolchain was not found under %VCPKG_ROOT%.
            exit /b 1
          )
          "%VCPKG_ROOT%\vcpkg.exe" version || exit /b 1
          echo VCPKG_ROOT=%VCPKG_ROOT%>>"%GITHUB_ENV%"

      - name: Configure build and test
        shell: cmd
        run: |
          set /p VS_PATH=<vs-path.txt
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" || exit /b 1
          where cl || exit /b 1
          where nmake || exit /b 1
          cmake --version || exit /b 1
          echo VCPKG_ROOT=%VCPKG_ROOT%
          cmake --preset windows-nmake-release || exit /b 1
          cmake --build --preset windows-nmake-release || exit /b 1
          ctest --preset windows-nmake-release || exit /b 1

  windows-msvc-nmake-vcpkg:
    name: Windows VS2026 NMake opt-in vcpkg (${{ matrix.preset }})
    runs-on: windows-2025-vs2026
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        preset:
          - windows-nmake-release-minizip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Locate Visual Studio
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath > vs-path.txt
          set /p VS_PATH=<vs-path.txt
          if "%VS_PATH%"=="" (
            echo Visual Studio with MSVC tools was not found.
            exit /b 1
          )
          if not exist "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" (
            echo vcvars64.bat was not found under the Visual Studio install.
            exit /b 1
          )
          echo VS_PATH=%VS_PATH%

      - name: Locate vcpkg
        shell: cmd
        run: |
          if "%VCPKG_ROOT%"=="" if not "%VCPKG_INSTALLATION_ROOT%"=="" set "VCPKG_ROOT=%VCPKG_INSTALLATION_ROOT%"
          if "%VCPKG_ROOT%"=="" if exist "C:\vcpkg\vcpkg.exe" set "VCPKG_ROOT=C:\vcpkg"
          if "%VCPKG_ROOT%"=="" (
            echo VCPKG_ROOT and VCPKG_INSTALLATION_ROOT were not set, and C:\vcpkg was not found.
            exit /b 1
          )
          if not exist "%VCPKG_ROOT%\vcpkg.exe" (
            echo vcpkg.exe was not found under %VCPKG_ROOT%.
            exit /b 1
          )
          if not exist "%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" (
            echo vcpkg CMake toolchain was not found under %VCPKG_ROOT%.
            exit /b 1
          )
          "%VCPKG_ROOT%\vcpkg.exe" version || exit /b 1
          echo VCPKG_ROOT=%VCPKG_ROOT%>>"%GITHUB_ENV%"

      - name: Configure build and test
        shell: cmd
        env:
          FASTXLSX_PRESET: ${{ matrix.preset }}
        run: |
          set /p VS_PATH=<vs-path.txt
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" || exit /b 1
          where cl || exit /b 1
          where nmake || exit /b 1
          cmake --version || exit /b 1
          echo FASTXLSX_PRESET=%FASTXLSX_PRESET%
          echo VCPKG_ROOT=%VCPKG_ROOT%
          cmake --preset %FASTXLSX_PRESET% || exit /b 1
          cmake --build --preset %FASTXLSX_PRESET% || exit /b 1
          ctest --preset %FASTXLSX_PRESET% || exit /b 1
